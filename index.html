      async function runAiAssistant(kind) {
        if (!deepseekKey) {
          toast("Please enter a DeepSeek API key first.");
          aiOutput = "Please enter a DeepSeek API key in the top bar first.";
          renderAiDrawer();
          return;
        }
        aiBusy = true;
        renderAiDrawer();
        try {
          const snapshot = buildAiSnapshot(state.teams[0], currentEnv());
          const prompt = kind === "suggest" ? buildDecisionSuggestPrompt(snapshot) : buildAnalysisPrompt(snapshot);
          const response = await callDeepSeek(AI_MODELS.strong, [
            { role: "system", content: "You are an MBS business simulation coach. Reply in concise Chinese. Use the provided data only." },
            { role: "user", content: prompt },
          ], { thinking: { type: "enabled" }, reasoning_effort: "medium" });
          aiOutput = response;
          if (kind === "suggest") applyAiSuggestion(response);
          localStorage.setItem(AI_OUTPUT_KEY, aiOutput);
        } catch (error) {
          aiOutput = `AI request failed: ${error.message || error}`;
        } finally {
          aiBusy = false;
          render();
        }
      }

      async function makeAiDecision(company, env, index) {
        const fallback = makeBotDecision(company, env, index);
        if (!deepseekKey) return fallback;
        const model = company.name.includes("A") ? AI_MODELS.strong : AI_MODELS.fast;
        const snapshot = buildAiSnapshot(company, env);
        try {
          const text = await callDeepSeek(model, [
            { role: "system", content: "You are an AI team in an MBS business simulation. Return only compact JSON with numeric decision fields." },
            { role: "user", content: buildOpponentPrompt(company, snapshot) },
          ], model === AI_MODELS.strong ? { thinking: { type: "enabled" }, reasoning_effort: "medium" } : {});
          const parsed = parseJsonFromText(text);
          return sanitizeDecision({ ...fallback, ...parsed, strategyNote: `${model} AI decision` });
        } catch (error) {
          state.events.unshift({ at: new Date().toISOString(), message: `${company.name} AI failed; local robot fallback used.` });
          return fallback;
        }
      }

      async function callDeepSeek(model, messages, extra = {}) {
        const response = await fetch(DEEPSEEK_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${deepseekKey}`,
          },
          body: JSON.stringify({ model, messages, stream: false, temperature: 0.35, ...extra }),
        });
        if (!response.ok) {
          const detail = await response.text().catch(() => "");
          throw new Error(`DeepSeek ${response.status}: ${detail.slice(0, 180)}`);
        }
        const data = await response.json();
        return data.choices?.[0]?.message?.content || "";
      }

      function buildAiSnapshot(team, env) {
        const last = latest(team);
        return {
          mode: competitionMode,
          round: state.quarter,
          environment: env,
          team: {
            name: team.name,
            cash: team.cash,
            debt: team.debt,
            equity: team.equity,
            capacity: team.capacity,
            rawInventory: team.rawInventory,
            pendingRawPurchase: team.pendingRawPurchase,
            finishedInventory: team.finishedInventory,
            brandIndex: team.brandIndex,
            qualityIndex: team.qualityIndex,
          },
          lastResult: last,
          currentDraft: state.playerDraft,
          competitors: state.teams.map((candidate) => {
            const row = latest(candidate);
            return { name: candidate.name, score: row.score || 0, marketShare: row.marketShare || 0, netProfit: row.netProfit || 0, price: row.decision?.price || candidate.previousPrice };
          }),
        };
      }

      function buildAnalysisPrompt(snapshot) {
        return `请分析当前 MBS 模拟赛局势。重点回答：1. 需求和销量；2. 产能、原料、库存；3. 成本和利润；4. 现金和破产风险；5. 下一轮最该检查的 3 个决策。数据：${JSON.stringify(snapshot)}`;
      }

      function buildDecisionSuggestPrompt(snapshot) {
        return `请基于数据给出下一轮决策建议。先用中文解释，再给一个 JSON 代码块，字段只能包括 price, marketing, rd, production, rawPurchase, equipment, maintenance, carbon, loan, repayment, dividend, forecastDemand。数据：${JSON.stringify(snapshot)}`;
      }

      function buildOpponentPrompt(company, snapshot) {
        return `Team ${company.name} must make a competitive decision for round ${snapshot.round}. Return only JSON with fields: price, marketing, rd, production, rawPurchase, equipment, maintenance, carbon, loan, repayment, dividend, forecastDemand. Use this data: ${JSON.stringify(snapshot)}`;
      }

      function applyAiSuggestion(text) {
        const parsed = parseJsonFromText(text);
        if (!parsed || typeof parsed !== "object") return;
        draft = sanitizeDecision({ ...draft, ...parsed, strategyNote: "AI suggested draft" });
        state.playerDraft = { ...draft };
        saveState();
      }

      function parseJsonFromText(text) {
        const block = String(text || "").match(/```json\s*([\s\S]*?)```/i)?.[1] || String(text || "").match(/\{[\s\S]*\}/)?.[0];
        if (!block) return {};
        try {
          return JSON.parse(block);
        } catch {
          return {};
        }
      }

      function escapeHtml(value) {
        return String(value || "").replace(/[&<>"']/g, (char) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[char]);
      }


      function scheduleDeepSeekTest() {
        clearTimeout(apiTestTimer);
        apiTestTimer = setTimeout(() => testDeepSeekConnection(), 650);
      }

      async function testDeepSeekConnection() {
        const keyAtStart = deepseekKey;
        if (!keyAtStart) {
          updateApiStatus("empty");
          return;
        }
        const runId = ++apiTestRun;
        updateApiStatus("testing");
        try {
          await callDeepSeek(AI_MODELS.fast, [
            { role: "system", content: "Reply with OK only." },
            { role: "user", content: "connection test" },
          ], { max_tokens: 8, temperature: 0 });
          if (runId !== apiTestRun || keyAtStart !== deepseekKey) return;
          deepseekConnected = true;
          updateApiStatus("connected");
        } catch (error) {
          if (runId !== apiTestRun || keyAtStart !== deepseekKey) return;
          deepseekConnected = false;
          updateApiStatus("failed", error.message || "Connection failed");
        }
      }

      function updateApiStatus(status, detail = "") {
        const input = document.getElementById("apiKeyInput");
        const statusEl = document.getElementById("apiStatus");
        if (!input || !statusEl) return;
        input.classList.remove("connected", "testing");
        statusEl.classList.remove("connected", "failed");
        if (status === "connected") {
          input.classList.add("connected");
          statusEl.classList.add("connected");
          statusEl.textContent = "DeepSeek \u5df2\u8fde\u63a5";
        } else if (status === "testing") {
          input.classList.add("testing");
          statusEl.textContent = "DeepSeek \u8fde\u63a5\u6d4b\u8bd5\u4e2d...";
        } else if (status === "failed") {
          statusEl.classList.add("failed");
          statusEl.textContent = detail.includes("Failed to fetch") ? "DeepSeek \u8fde\u63a5\u5931\u8d25\uff1a\u6d4f\u89c8\u5668\u53ef\u80fd\u62e6\u622a\u8de8\u57df\u8bf7\u6c42" : "DeepSeek \u8fde\u63a5\u5931\u8d25";
        } else {
          statusEl.textContent = deepseekKey ? "DeepSeek \u5f85\u6d4b\u8bd5" : "DeepSeek \u672a\u8fde\u63a5";
        }
      }

          metric("你的排名", `#${rank || "-"}`, `总分 ${fmt(last.score || 0)}`),
          metric("现金", money(company.cash), `负债 ${money(company.debt)}`),

          metric("下一期产能", fmt(company.capacity), `原料 ${fmt(company.rawInventory)} + 在途 ${fmt(company.pendingRawPurchase)}`),
        ].join("");

      function renderCommand() {

        const env = environments[Math.min(state.quarter - 1, environments.length - 1)];
        document.getElementById("command").innerHTML = `

      function reportPanel(title, body) {

      function dataTable(headers, rows) {
        const safeRows = rows.length ? rows : [[`No submitted round yet`, ...headers.slice(1).map(() => "-")]];
        return `<table><thead><tr>${headers.map((head) => `<th>${head}</th>`).join("")}</tr></thead><tbody>${safeRows.map((row) => `<tr>${row.map((cell) => `<td>${cell ?? "-"}</td>`).join("")}</tr>`).join("")}</tbody></table>`;
      }

      function historyRows(team) {
        return team.history.filter((row) => row.quarter > 0);
      }

      function roundList() {
        const rounds = new Set();
        state.teams.forEach((team) => historyRows(team).forEach((row) => rounds.add(row.quarter)));
        return [...rounds].sort((a, b) => a - b);
      }

      function roundResult(team, round) {
        return team.history.find((row) => row.quarter === round) || {};
      }

      function currentEnv() {
        return environments[Math.min(Math.max(state.quarter - 1, 0), environments.length - 1)] || environments[0];
      }

      function safeRatio(numerator, denominator) {
        const bottom = Number(denominator) || 0;
        return bottom === 0 ? 0 : (Number(numerator) || 0) / bottom;
      }

      function inventoryTurnover(row, team) {
        const inventoryValue = ((row.finishedInventory || team.finishedInventory || 0) * 3) + ((row.rawInventory || team.rawInventory || 0) * currentEnv().rawMaterialPrice);
        return safeRatio(row.cogs || 0, inventoryValue);
      }

      async function processQuarter(playerDecision) {
        if (state.quarter > environments.length) return;
        const env = environments[state.quarter - 1];
        const decisions = new Map();
        for (const [index, company] of state.teams.entries()) {
          if (company.type === "player") decisions.set(company.id, sanitizeDecision(playerDecision));
          else if (competitionMode === "ai") decisions.set(company.id, await makeAiDecision(company, env, index));
          else decisions.set(company.id, makeBotDecision(company, env, index));
        }

        const active = state.teams.filter((team) => !team.bankrupt);
        const avgPrice = active.reduce((sum, team) => sum + decisions.get(team.id).price, 0) / Math.max(1, active.length);
        const avgBrand = active.reduce((sum, team) => sum + team.brandIndex, 0) / Math.max(1, active.length);
        const avgQuality = active.reduce((sum, team) => sum + team.qualityIndex, 0) / Math.max(1, active.length);
        const elasticity = env.priceElasticity === "High" ? 2.2 : env.priceElasticity === "Low" ? 1.1 : 1.65;
        const marketingImpact = env.marketingImpact === "High" ? 0.34 : env.marketingImpact === "Low" ? 0.18 : 0.25;
        const rdImpact = env.rdImpact === "High" ? 0.27 : env.rdImpact === "Low" ? 0.14 : 0.21;
        const attractiveness = new Map();
        let totalAttractiveness = 0;

        active.forEach((team) => {
          const d = decisions.get(team.id);
          const priceScore = Math.exp(-elasticity * ((d.price - avgPrice) / avgPrice));
          const marketingScore = 1 + marketingImpact * Math.log1p(d.marketing / 100000) + 0.22 * team.brandIndex / avgBrand;
          const qualityScore = 1 + rdImpact * Math.log1p(d.rd / 100000) + 0.25 * team.qualityIndex / avgQuality;
          const momentum = 0.82 + team.previousMarketShare * active.length * 0.18;
          const score = priceScore * marketingScore * qualityScore * momentum;
          attractiveness.set(team.id, score);
          totalAttractiveness += score;
        });

        const marketDemand = env.baseDemand * env.growthRate * (env.seasonalIndex / 100);
        const provisional = new Map();
        active.forEach((team) => provisional.set(team.id, marketDemand * (attractiveness.get(team.id) / totalAttractiveness)));

        const prelim = new Map();
        let stolenDemand = 0;
        let openSupplyWeight = 0;
        active.forEach((team) => {
          const operational = runOperations(team, decisions.get(team.id), env, provisional.get(team.id), false);
          prelim.set(team.id, operational);
          const shortage = Math.max(0, operational.potentialDemand - operational.salesVolume);
          const spare = Math.max(0, operational.availableForSale - operational.salesVolume);
          stolenDemand += shortage * 0.7;
          if (spare > 0) openSupplyWeight += spare * attractiveness.get(team.id);
        });

        const results = [];
        active.forEach((team) => {
          const p = prelim.get(team.id);
          const spare = Math.max(0, p.availableForSale - p.salesVolume);
          const extra = stolenDemand > 0 && spare > 0 && openSupplyWeight > 0 ? stolenDemand * ((spare * attractiveness.get(team.id)) / openSupplyWeight) : 0;
          results.push(runOperations(team, decisions.get(team.id), env, provisional.get(team.id) + extra, true));
        });

        const totalSales = results.reduce((sum, result) => sum + result.salesVolume, 0) || 1;
        results.forEach((result) => {
          const team = state.teams.find((candidate) => candidate.id === result.companyId);
          result.marketShare = result.salesVolume / totalSales;
          applyResult(team, result, decisions.get(team.id));
        });

        updateScores();
        state.submissions.push({
          quarter: env.quarter,
          at: new Date().toISOString(),
          playerDecision: sanitizeDecision(playerDecision),
        });
        state.events.unshift({ at: new Date().toISOString(), message: `Quarter ${env.quarter} processed. Reports and ranking are updated.` });
        state.quarter += 1;
        state.status = state.quarter > environments.length ? "finished" : "decision";
        state.playerDraft = nextSuggestedDraft(state.teams[0], state.playerDraft);
        draft = { ...state.playerDraft };
      }

      function runOperations(team, d, env, potentialDemand, includeFinance) {
        const availableRaw = team.rawInventory + team.pendingRawPurchase;
        const maintenanceLift = env.maintenanceImpact === "High" ? 0.045 : env.maintenanceImpact === "Low" ? 0.025 : 0.035;
        const conversionRate = Math.min(0.96, 0.74 + maintenanceLift * Math.log1p(d.maintenance / 80000) + 0.012 * team.qualityIndex);
        const capacityLimit = team.capacity * 1.5;
        const rawLimit = availableRaw * conversionRate;
        const production = Math.floor(Math.min(d.production, capacityLimit, rawLimit));
        const rawUsed = production / conversionRate;
        const availableForSale = team.finishedInventory + production;
        const salesVolume = Math.floor(Math.min(availableForSale, potentialDemand));
        const finishedInventory = Math.max(0, availableForSale - salesVolume);
        const revenue = salesVolume * d.price;
        const materialCost = rawUsed * env.rawMaterialPrice;
        const regularProduction = Math.min(production, team.capacity);
        const overtimeProduction = Math.max(0, production - team.capacity);
        const laborCost = (regularProduction * 0.85 + overtimeProduction * 1.275) * env.priceIndex;
        const depreciation = team.equipmentBookValue * 0.025;
        const adminExpense = (150000 + 0.32 * team.capacity) * env.priceIndex;
        const purchaseOps = purchasingFee(d.rawPurchase) * env.priceIndex;
        const warehouseFinished = finishedInventory * 0.5 * (1 / 3);
        const warehouseRaw = Math.max(0, availableRaw - rawUsed) * env.rawMaterialPrice * 0.05;
        const equipmentMisc = 0.0000001 * d.equipment * d.equipment;
        const cogs = materialCost + laborCost;
        const grossProfit = revenue - cogs;
        const carbonPenalty = Math.max(0, production * 0.08 - d.carbon * 0.6);
        const operatingExpense = d.marketing + d.rd + d.maintenance + d.carbon + carbonPenalty + adminExpense + purchaseOps + warehouseFinished + warehouseRaw + equipmentMisc + depreciation;
        let debt = team.debt;
        let cash = team.cash;
        const repayment = Math.min(d.repayment, debt, cash);
        if (includeFinance) {
          cash += d.loan - repayment;
          debt += d.loan - repayment;
        }
        const debtToEquity = debt / Math.max(1, team.equity);
        const loanRate = Math.min(0.2, 0.07 * (1 + 0.5 * debtToEquity));
        const interest = debt * loanRate / 4;
        const ebt = grossProfit - operatingExpense - interest;
        const tax = Math.max(0, ebt * taxRate(ebt));
        const allowedDividend = team.equity > 10000000 ? Math.min(d.dividend, Math.max(0, cash * 0.75)) : 0;
        const netProfit = ebt - tax;
        const rawPurchaseCost = d.rawPurchase * env.rawMaterialPrice;

        if (includeFinance) {
          cash += revenue - d.marketing - d.rd - d.maintenance - purchaseOps - adminExpense - warehouseFinished - warehouseRaw;
          cash -= rawPurchaseCost + d.equipment + d.carbon + carbonPenalty + equipmentMisc + interest + tax + allowedDividend;
          if (cash < 0) {
            debt += Math.abs(cash);
            cash = 0;
          }
        }

        const rawInventory = Math.max(0, availableRaw - rawUsed);
        const currentAssets = cash + finishedInventory * 3 * env.priceIndex + rawInventory * env.rawMaterialPrice;
        const equipmentBookValue = (team.equipmentBookValue + d.equipment) * 0.975;
        const totalAssets = currentAssets + equipmentBookValue;
        const equity = totalAssets - debt;
        const debtRatio = debt / Math.max(1, equity);
        const nextCapacity = team.capacity * 0.975 + d.equipment / (20 * env.priceIndex);

        return {
          companyId: team.id,
          quarter: env.quarter,
          decision: d,
          conversionRate,
          potentialDemand,
          production,
          rawUsed,
          availableForSale,
          salesVolume,
          lostSales: Math.max(0, potentialDemand - salesVolume),
          finishedInventory,
          rawInventory,
          pendingRawPurchase: d.rawPurchase,
          capacity: nextCapacity,
          revenue,
          materialCost,
          laborCost,
          cogs,
          grossProfit,
          operatingExpense,
          rawPurchaseCost,
          interest,
          tax,
          dividend: allowedDividend,
          netProfit,
          cash,
          debt,
          currentAssets,
          totalAssets,
          equity,
          equipmentBookValue,
          debtRatio,
          currentRatio: currentAssets / Math.max(1, debt),
          roa: netProfit / Math.max(1, totalAssets),
          fillRate: salesVolume / Math.max(1, potentialDemand),
          dsi: cogs > 0 ? (365 * (finishedInventory * 3 * env.priceIndex)) / cogs : 0,
          score: 0,
          carbonPenalty,
          bankrupt: debtRatio >= 10 || equity <= 0,
        };
      }

      function applyResult(team, result, decision) {
        team.cash = result.cash;
        team.finishedInventory = result.finishedInventory;
        team.rawInventory = result.rawInventory;
        team.pendingRawPurchase = result.pendingRawPurchase;
        team.equipmentBookValue = result.equipmentBookValue;
        team.capacity = result.capacity;
        team.debt = result.debt;
        team.equity = result.equity;
        team.qualityIndex = 0.6 * team.qualityIndex + 0.4 * (1 + Math.log1p(decision.rd / 120000) * 0.18);
        team.brandIndex = 0.7 * team.brandIndex + 0.3 * (1 + Math.log1p(decision.marketing / 120000) * 0.16);
        team.previousMarketShare = result.marketShare;
        team.previousPrice = decision.price;
        team.bankrupt = result.bankrupt;
        team.cumulative.revenue += result.revenue;
        team.cumulative.netProfit += result.netProfit;
        team.cumulative.salesVolume += result.salesVolume;
        team.cumulative.potentialDemand += result.potentialDemand;
        team.cumulative.fillRateNumerator += result.salesVolume;
        team.cumulative.fillRateDenominator += result.potentialDemand;
        team.cumulative.equipmentMaintenance += decision.equipment + decision.maintenance;
        team.cumulative.dsiNumerator += result.dsi;
        team.cumulative.dsiDenominator += 1;
        team.history.push(result);
      }

      function updateScores() {
        state.teams.forEach((team) => (team._score = 0));
        const totalCompanySales = state.teams.reduce((sum, team) => sum + team.cumulative.salesVolume, 0) || 1;
        const metrics = state.teams.map((team) => {
          const last = latest(team);
          return {
            team,
            netProfit: team.cumulative.netProfit,
            marketShare: team.cumulative.salesVolume / totalCompanySales,
            fillRate: team.cumulative.fillRateNumerator / Math.max(1, team.cumulative.fillRateDenominator),
            learning: team.cumulative.equipmentMaintenance,
            roa: team.cumulative.netProfit / Math.max(1, last.totalAssets || 11200000),
            dsi: team.cumulative.dsiNumerator / Math.max(1, team.cumulative.dsiDenominator),
          };
        });
        [
          ["netProfit", 35, true],
          ["marketShare", 25, true],
          ["fillRate", 10, true],
          ["learning", 10, true],
          ["roa", 10, true],
          ["dsi", 10, false],
        ].forEach(([key, weight, higherBetter]) => {
          const values = metrics.map((item) => item[key]).filter(Number.isFinite);
          const min = Math.min(...values);
          const max = Math.max(...values);
          metrics.forEach((item) => {
            let normalized = 1;
            if (max !== min) normalized = higherBetter ? (item[key] - min) / (max - min) : (max - item[key]) / (max - min);
            item.team._score += normalized * weight;
          });
        });
        state.teams.forEach((team) => {
          latest(team).score = Math.max(0, (team._score || 0) - (team.bankrupt ? 40 : 0));
          delete team._score;
        });
      }

      function makeBotDecision(company, env, index) {
        const last = latest(company);
        const shortage = Math.max(0, (last.potentialDemand || 0) - (last.salesVolume || 0));
        const inventoryPressure = company.finishedInventory / Math.max(1, last.salesVolume || 1);
        let price = company.previousPrice;
        let marketing = 150000;
        let rd = 90000;
        let production = Math.max(360000, last.potentialDemand || 430000);
        let rawPurchase = production * 1.2;
        let equipment = 120000;
        let maintenance = 85000;
        let dividend = 0;
        let loan = 0;
        let repayment = 0;
        let carbon = 0;

        if (company.profile === "discount") {
          price = 5.8 + 0.12 * env.quarter + (index % 2) * 0.15;
          marketing = 210000 + 25000 * env.quarter;
          rd = 65000;
          production *= 1.14;
          rawPurchase *= 1.2;
        } else if (company.profile === "premium") {
          price = 7.1 + 0.08 * env.quarter + (index % 3) * 0.08;
          marketing = 130000 + 18000 * env.quarter;
          rd = 165000 + 22000 * env.quarter;
          production *= 0.96;
          rawPurchase *= 1.05;
        } else if (company.profile === "growth") {
          price = 6.35 + 0.05 * env.quarter;
          marketing = 220000 + 35000 * env.quarter;
          rd = 150000 + 25000 * env.quarter;
          production *= 1.2;
          rawPurchase *= 1.3;
          equipment = 240000 + 60000 * env.quarter;
          carbon = 45000 + 6000 * env.quarter;
        } else if (company.profile === "cash") {
          price = 6.75 + 0.1 * env.quarter;
          marketing = 95000 + 12000 * env.quarter;
          rd = 45000;
          production *= 0.92;
          rawPurchase *= 0.9;
          maintenance = 65000;
          repayment = Math.min(company.cash * 0.15, company.debt * 0.35);
        } else {
          price = 6.35 + 0.08 * env.quarter + (index % 3 - 1) * 0.08;
          marketing = 150000 + 22000 * env.quarter;
          rd = 90000 + 18000 * env.quarter;
          production *= 1.04;
          rawPurchase *= 1.1;
        }

        if (shortage > 40000) {
          production += shortage * 0.65;
          rawPurchase += shortage * 0.85;
          equipment += 100000;
        }
        if (inventoryPressure > 0.25) {
          price -= 0.22;
          marketing += 50000;
          production *= 0.86;
        }
        if (company.cash < 450000) loan = 500000;
        if (env.quarter === environments.length) {
          equipment *= 0.25;
          rawPurchase *= 0.35;
          if (company.equity > 10500000 && company.cash > 1200000) dividend = company.cash * 0.16;
        }

        return sanitizeDecision({
          price,
          marketing,
          rd,
          production,
          rawPurchase,
          equipment,
          maintenance,
          loan,
          repayment,
          dividend,
          carbon,
          forecastDemand: production,
          strategyNote: `${company.profile} bot`,
        });
      }

      function nextSuggestedDraft(team, previous) {
        const last = latest(team);
        const next = { ...previous };
        if (!last || last.quarter === 0) return next;
        if (last.lostSales > 30000) {
          next.production = Math.round(Math.min(1450000, previous.production + last.lostSales * 0.7));
          next.rawPurchase = Math.round(Math.min(2400000, previous.rawPurchase + last.lostSales * 0.9));
          next.equipment = Math.round(previous.equipment + 80000);
        }
        if (last.finishedInventory > last.salesVolume * 0.25) {
          next.production = Math.round(previous.production * 0.85);
          next.marketing = Math.round(previous.marketing + 40000);
          next.price = Math.max(3, Math.round((previous.price - 0.15) * 100) / 100);
        }
        if (last.netProfit < 0) {
          next.marketing = Math.round(previous.marketing * 0.88);
          next.rd = Math.round(previous.rd * 0.85);
          next.dividend = 0;
        }
        if (state.quarter === environments.length) {
          next.equipment = Math.round(previous.equipment * 0.35);
          next.rawPurchase = Math.round(previous.rawPurchase * 0.45);
        }
        next.forecastDemand = Math.round(last.potentialDemand * 1.02);
        next.strategyNote = "已根据上一轮报告自动生成起点，请由各角色复核后再提交。";
        return sanitizeDecision(next);
      }

      function rankings() {
        return state.teams
          .map((team) => {
            const last = latest(team);
            return {
              id: team.id,
              name: team.name,
              type: team.type,
              bankrupt: team.bankrupt,
              score: last.score || 0,
              marketShare: last.marketShare || team.previousMarketShare,
              revenue: last.revenue || 0,
              netProfit: last.netProfit || 0,
              cash: team.cash,
              debt: team.debt,
              equity: team.equity,
              fillRate: last.fillRate || 1,
            };
          })
          .sort((a, b) => b.score - a.score);
      }

      function sanitizeDecision(input) {
        const d = input || {};
        return {
          price: Math.round(clamp(d.price, 3, 9) * 100) / 100,
          marketing: whole(clamp(d.marketing, 0, 800000)),
          rd: whole(clamp(d.rd, 0, 700000)),
          production: whole(clamp(d.production, 0, 1500000)),
          rawPurchase: whole(clamp(d.rawPurchase, 0, 2500000)),
          equipment: whole(clamp(d.equipment, 0, 3000000)),
          maintenance: whole(clamp(d.maintenance, 0, 600000)),
          loan: whole(clamp(d.loan, 0, 4000000)),
          repayment: whole(clamp(d.repayment, 0, 4000000)),
          dividend: whole(clamp(d.dividend, 0, 2500000)),
          carbon: whole(clamp(d.carbon, 0, 700000)),
          forecastDemand: whole(clamp(d.forecastDemand, 0, 1500000)),
          strategyNote: String(d.strategyNote || "").slice(0, 600),
        };
      }

      function purchasingFee(quantity) {
        if (quantity <= 0) return 0;
        if (quantity <= 500000) return 40000;
        if (quantity <= 1000000) return 80000;
        if (quantity <= 1500000) return 120000;
        if (quantity <= 2000000) return 160000;
        return 200000;
      }

      function taxRate(ebt) {
        if (ebt <= 0) return 0;
        if (ebt < 200000) return 0.22;
        if (ebt < 500000) return 0.35;
        if (ebt < 1000000) return 0.48;
        return 0.55;
      }

      function warnings(company, last) {
        const lines = [];
        if (state.status === "finished") lines.push("练习赛已结束。可以在排名页复盘四轮策略，也可以重开练习。");
        if ((last.lostSales || 0) > 30000) lines.push(`上一轮缺货 ${fmt(last.lostSales)} 件，检查生产、原料和产能是否太保守。`);
        if (company.finishedInventory > Math.max(60000, (last.salesVolume || 1) * 0.25)) lines.push("制成品库存偏高，可能需要降低生产、调整价格或加大有效营销。");
        if ((last.netProfit || 0) < 0) lines.push("上一轮亏损，提交前重点检查价格、营销/研发、维修和设备投资是否覆盖成本。");
        if ((company.debt || 0) / Math.max(1, company.equity || 1) > 2) lines.push("债务权益比偏高，继续扩张前先评估利息和破产风险。");
        if (!lines.length) lines.push("当前没有明显红灯。继续用需求、供给、利润率、现金流四条线交叉检查。");
        return lines;
      }

      function roleAdvice(currentRole) {
        if (currentRole === "finance") {
          return ["提交前检查现金、负债、利息、税和股息。现金不足会触发自动借款。", "如果净利润为负，不要用贷款掩盖经营问题，优先压缩低回报费用。", "股息只在现金充足、权益健康、最后冲刺有意义时考虑。"];
        }
        if (currentRole === "sales") {
          return ["价格不能只看销量；同时估算单位成本、毛利率和净利润率。", "营销可以推高需求，但如果生产跟不上，会把订单送给对手。", "研发适合支撑高价和中长期需求，最后一轮要谨慎加码。"];
        }
        if (currentRole === "production") {
          return ["先看上一轮缺货还是库存，再决定生产请求。", "原材料有一轮滞后，本轮采购是在为下一轮准备。", "维修在产量高、原料贵时价值更大；设备投资要看剩余回合和现金。"];
        }
        return ["先确认本轮最大问题：缺货、库存、利润率、现金，还是排名落后。", "让销售给出需求假设，生产采购验证可供给，财务最后检查现金风险。", "Quarter 4 不再盲目做长期投资，重点是利润、库存、债务和最终得分。"];
      }

      function metric(label, value, sub) {
        return `<div class="metric"><span class="label">${label}</span><span class="value">${value}</span><span class="sub">${sub}</span></div>`;
      }

      function smallKpi(label, value, sub) {
        return `<div class="small-kpi"><span>${label}</span><strong>${value}</strong><span>${sub}</span></div>`;
      }

      function kvTable(rows) {
        return `<table><tbody>${rows.map(([key, value]) => `<tr><td>${key}</td><td>${value}</td></tr>`).join("")}</tbody></table>`;
      }

      function latest(team) {
        return team.history[team.history.length - 1] || {};
      }

      function slug(value) {
        return value.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
      }

      function clamp(value, min, max) {
        const n = Number(value);
        if (!Number.isFinite(n)) return min;
        return Math.max(min, Math.min(max, n));
      }

      function whole(value) {
        return Math.round(Number(value) || 0);
      }

      function fmt(value) {
        return moneyFmt.format(Math.round(Number(value) || 0));
      }

      function money(value) {
        return `$${fmt(value)}`;
      }

      function time(value) {
        return new Date(value).toLocaleTimeString("zh-HK", { hour: "2-digit", minute: "2-digit" });
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function toast(message) {
        const el = document.getElementById("toast");
        el.textContent = message;
        el.hidden = false;
        clearTimeout(toast.timer);
        toast.timer = setTimeout(() => {
          el.hidden = true;
        }, 2600);
      }
    </script>
  </body>
